name: ci-backend

on:
  push:
    branches: [main, feat/**]
    paths:
      - 'server/**'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    paths:
      - 'server/**'
      - '.github/workflows/ci-backend.yml'
  workflow_dispatch:

concurrency:
  group: ci-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          pip install -e "server[dev]"

      - name: Ruff
        run: ruff check server

      - name: Pytest
        env:
          # No real key ever in CI. Tests mock every upstream call.
          ALPHA_VANTAGE_API_KEY: ""
        run: pytest server/tests -q
